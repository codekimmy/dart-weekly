name: weekly-disclosures

on:
  schedule:
    - cron: "0 22 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Collect disclosures
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
        run: python collect_disclosures.py

      - name: Commit updated JSON
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add disclosures.json
          git diff --staged --quiet || git commit -m "chore: weekly disclosures update"
          git push
